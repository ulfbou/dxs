name: ci
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup.NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore dxs.slnx

      - name: Build
        run: dotnet build dxs.slnx --configuration Release --no-restore -warnaserror

      - name: Test
        run: dotnet test dxs.slnx --configuration Release --no-build --verbosity normal
